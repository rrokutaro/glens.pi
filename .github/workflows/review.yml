name: Review Server

on:
  workflow_dispatch:
    inputs:
      mongodb_uri:
        description: 'MongoDB URI (or leave empty to use secrets.ORCHESTRATOR_MONGODB_URI)'
        required: false
        default: ''
      mongodb_db:
        description: 'MongoDB database name'
        required: false
        default: 'ugc-dropship'
      mongodb_collection:
        description: 'MongoDB collection name'
        required: false
        default: 'scraped-posts'
      hf_token:
        description: 'HuggingFace Token for Video Streaming'
        required: false
        default: ''
      review_port:
        description: 'Port for review server'
        required: false
        default: '3456'
      log_level:
        description: 'Log verbosity: debug | info | warn | error'
        required: false
        default: 'info'
      gemini_api_keys:
        description: 'Comma-separated Gemini API keys for manual Data Sync (or use secrets.ORCHESTRATOR_GEMINI_API_KEYS)'
        required: false
        default: ''
      gemini_model:
        description: 'Gemini model for text extraction sync'
        required: false
        default: 'gemini-3.5-flash-lite'

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          pip install "scenedetect[opencv]" ultralytics opencv-python-headless pillow numpy scipy
          pip install -U crawl4ai imagehash httpx cloakbrowser beautifulsoup4 lxml curl_cffi
          playwright install-deps chromium

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ffmpeg libnss3 libxss1 libasound2t64 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libgbm1 libxkbcommon-x11-0 libxcomposite1 libxrandr2 \
            libpango-1.0-0 libcairo2 libxdamage1 xvfb

      - name: Install CloakBrowser anti-detection fonts
        run: |
          sudo dpkg --configure -a
          sudo rm -f /var/lib/dpkg/lock-frontend /var/cache/debconf/config.dat.lock /tmp/segoe.zip
          sudo pkill -9 apt || true
          echo ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true | sudo debconf-set-selections
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
              fonts-noto-color-emoji fonts-freefont-ttf ttf-mscorefonts-installer \
              fonts-unifont fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf fontconfig
          fc-cache -f -v

      - name: Create package.json type module
        run: |
          if [ -f package.json ]; then
            node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); p.type='module'; fs.writeFileSync('package.json', JSON.stringify(p,null,2)+'\n'); console.log('Updated package.json with type:module');"
          else
            echo '{"name":"review-server","type":"module"}' > package.json
          fi

      - name: Install npm dependencies
        run: npm install mongodb cloakbrowser puppeteer puppeteer-core

      - name: Install CloakBrowser Chromium binary
        run: npx cloakbrowser install

      - name: Pre-download YOLO weights
        run: wget -q https://github.com/ultralytics/assets/releases/download/v8.2.0/yolov8n.pt -O yolov8n.pt

      - name: Install ngrok
        run: |
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update && sudo apt install -y ngrok
          ngrok config add-authtoken ${{ secrets.NGROK_AUTHTOKEN }}

      - name: Mask secrets
        env:
          MONGO: ${{ github.event.inputs.mongodb_uri || secrets.ORCHESTRATOR_MONGODB_URI }}
        run: echo "::add-mask::$MONGO"

      - name: Mask Gemini keys
        env:
          KEYS: ${{ github.event.inputs.gemini_api_keys || secrets.ORCHESTRATOR_GEMINI_API_KEYS }}
        run: |
          IFS=',' read -ra KARR <<< "$KEYS"
          for k in "${KARR[@]}"; do echo "::add-mask::$k"; done

      - name: Run Review Server
        env:
          ORCH_MONGODB_URI: ${{ github.event.inputs.mongodb_uri || secrets.ORCHESTRATOR_MONGODB_URI || '' }}
          ORCH_MONGODB_DB: ${{ github.event.inputs.mongodb_db || 'ugc-dropship' }}
          ORCH_MONGODB_COLLECTION: ${{ github.event.inputs.mongodb_collection || 'scraped-posts' }}
          REVIEW_PORT: ${{ github.event.inputs.review_port || '3456' }}
          ORCH_LOG_LEVEL: ${{ github.event.inputs.log_level || 'info' }}
          ORCH_HF_TOKEN: ${{ github.event.inputs.hf_token || secrets.ORCHESTRATOR_HF_TOKEN || '' }}
          ORCH_GEMINI_API_KEYS: ${{ github.event.inputs.gemini_api_keys || secrets.ORCHESTRATOR_GEMINI_API_KEYS || '' }}
          ORCH_GEMINI_MODEL: ${{ github.event.inputs.gemini_model || 'gemini-3.5-flash-lite' }}
        run: node review-server.js