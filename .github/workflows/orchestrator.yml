name: Orchestrator

on:
  workflow_dispatch:
    inputs:
      mongodb_uri:
        description: 'MongoDB URI (or leave empty to use secrets.ORCHESTRATOR_MONGODB_URI)'
        required: false
        default: ''
      mongodb_db:
        description: 'MongoDB database name'
        required: false
        default: 'ugc-dropship'
      mongodb_collection:
        description: 'MongoDB collection name'
        required: false
        default: 'scraped-posts'
      hf_token:
        description: 'HuggingFace write token (or leave empty to use secrets.ORCHESTRATOR_HF_TOKEN)'
        required: false
        default: ''
      hf_repo:
        description: 'HuggingFace repo ID (e.g., rrokutaro/ugc-dropship)'
        required: false
        default: 'rrokutaro/ugc-dropship'
      hf_assets_path:
        description: 'Path inside the HF repo for downloaded post assets'
        required: false
        default: 'scraped-posts/assets'
      batch_size:
        description: 'Max number of posts to download per run'
        required: false
        default: '50'
      downloader_concurrency:
        description: 'How many posts to process in parallel during download'
        required: false
        default: '3'
      log_level:
        description: 'Log verbosity: debug | info | warn | error'
        required: false
        default: 'info'
      recording:
        description: 'Enable screen recording of downloader sessions (true/false)'
        required: false
        default: 'true'
      recording_fps:
        description: 'Recording framerate'
        required: false
        default: '12'
      recording_quality:
        description: 'Recording JPEG quality (1-100)'
        required: false
        default: '60'
      recording_res:
        description: 'Recording resolution (WxH)'
        required: false
        default: '1280x800'
      review_enabled:
        description: 'Enable the AI (Gemini) review stage (true/false)'
        required: false
        default: 'true'
      review_fetch_limit:
        description: 'Max number of unreviewed image file_urls to fetch and review per run'
        required: false
        default: '60'
      review_max_rows:
        description: 'Max rows per review collage'
        required: false
        default: '4'
      review_max_cols:
        description: 'Max columns per row in a review collage (keeps frames large enough for the AI to inspect)'
        required: false
        default: '5'
      review_cell_aspect_ratio:
        description: 'Fixed width/height ratio for every collage cell (e.g. 0.75 = 3:4 portrait). Set to 0 to use each image''s natural ratio.'
        required: false
        default: '0.75'
      review_collage_gutter:
        description: 'White gutter (px) between cells and rows in the review collage. Set to 0 to disable.'
        required: false
        default: '8'
      gemini_model:
        description: 'Google Gemini model to use for review'
        required: false
        default: 'gemini-3.5-flash-lite'
      gemini_api_keys:
        description: 'Comma-separated Google Gemini API keys (or leave empty to use secrets.ORCHESTRATOR_GEMINI_API_KEYS)'
        required: false
        default: ''
      review_save_collages:
        description: 'Save every review collage JPEG (+ ref map) to the output artifacts for debugging (true/false)'
        required: false
        default: 'false'
      audit_enabled:
        description: 'Enable the JSON Audit & Repair stage (true/false)'
        required: false
        default: 'true'
      audit_limit:
        description: 'Max number of reviewed responses to audit per run'
        required: false
        default: '40'
      audit_save_changes:
        description: 'Persist the per-item changes array from the auditor into MongoDB as auditChanges (true/false)'
        required: false
        default: 'false'

  repository_dispatch:
    types:
      - orchestrator-run

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          pip install "scenedetect[opencv]" ultralytics opencv-python-headless pillow numpy scipy lxml curl_cffi chompjs
          pip install -U crawl4ai imagehash httpx cloakbrowser
          playwright install-deps chromium

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-orchestrator-${{ hashFiles('.github/workflows/orchestrator.yml') }}
          restore-keys: |
            apt-${{ runner.os }}-orchestrator-
            apt-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            libnss3 libxss1 libasound2t64 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libgbm1 libxkbcommon-x11-0 libxcomposite1 libxrandr2 \
            libpango-1.0-0 libcairo2 libxdamage1

      - name: Install CloakBrowser anti-detection fonts
        run: |
          # ── Fix 1: Repair dpkg and clear locks ─────────────────────────────────
          sudo dpkg --configure -a
          sudo rm -f /var/lib/dpkg/lock-frontend /var/cache/debconf/config.dat.lock /tmp/segoe.zip
          sudo pkill -9 apt || true

          # ── Fix 2: Pre-accept EULA ────────────────────────────────────────────
          echo ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true | sudo debconf-set-selections

          # ── Fix 3: Install fonts ──────────────────────────────────────────────
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
              fonts-noto-color-emoji \
              fonts-freefont-ttf \
              ttf-mscorefonts-installer \
              fonts-unifont \
              fonts-ipafont-gothic \
              fonts-wqy-zenhei \
              fonts-tlwg-loma-otf \
              fontconfig

          fc-cache -f -v

          # ── Fix 4: Segoe UI (clean unzip, no prompts) ──────────────────────────
          rm -rf /tmp/segoe-ui-linux-master
          wget -q https://github.com/mrbvrz/segoe-ui-linux/archive/refs/heads/master.zip -O /tmp/segoe.zip
          unzip -oq /tmp/segoe.zip -d /tmp/

          sudo mkdir -p /usr/share/fonts/truetype/segoe-ui
          sudo cp /tmp/segoe-ui-linux-master/fonts/*.ttf /usr/share/fonts/truetype/segoe-ui/ 2>/dev/null || echo "No .ttf files found in zip"
          fc-cache -f -v

      - name: Install npm dependencies
        run: npm install cloakbrowser puppeteer puppeteer-core mmdb-lib mongodb sharp jsonrepair

      - name: Get installed CloakBrowser version
        id: cloakbrowser-version
        run: echo "version=$(node -p "require('./node_modules/cloakbrowser/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache CloakBrowser Chromium binary
        uses: actions/cache@v4
        with:
          path: ~/.cloakbrowser
          key: cloakbrowser-${{ runner.os }}-${{ steps.cloakbrowser-version.outputs.version }}

      - name: Install CloakBrowser Chromium binary
        run: npx cloakbrowser install

      - name: Create package.json type module
        run: |
          if [ -f package.json ]; then
            node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); p.type='module'; fs.writeFileSync('package.json', JSON.stringify(p,null,2)+'\n'); console.log('Updated package.json with type:module');"
          else
            echo '{"name":"orchestrator","type":"module"}' > package.json
          fi

      - name: Mask HF token
        if: |
          (github.event_name == 'workflow_dispatch' && github.event.inputs.hf_token != '') ||
          (github.event_name == 'repository_dispatch' && github.event.client_payload.hf_token != '')
        env:
          TOKEN_TO_MASK: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.hf_token || github.event.client_payload.hf_token }}
        run: echo "::add-mask::$TOKEN_TO_MASK"

      - name: Mask MongoDB URI
        if: |
          (github.event_name == 'workflow_dispatch' && github.event.inputs.mongodb_uri != '') ||
          (github.event_name == 'repository_dispatch' && github.event.client_payload.mongodb_uri != '')
        env:
          TOKEN_TO_MASK: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mongodb_uri || github.event.client_payload.mongodb_uri }}
        run: echo "::add-mask::$TOKEN_TO_MASK"

      - name: Mask Gemini API keys
        if: |
          (github.event_name == 'workflow_dispatch' && github.event.inputs.gemini_api_keys != '') ||
          (github.event_name == 'repository_dispatch' && github.event.client_payload.gemini_api_keys != '')
        env:
          KEYS_TO_MASK: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.gemini_api_keys || github.event.client_payload.gemini_api_keys }}
        run: |
          IFS=',' read -ra KEYS <<< "$KEYS_TO_MASK"
          for k in "${KEYS[@]}"; do echo "::add-mask::$k"; done

      - name: Run Orchestrator
        env:
          ORCH_MONGODB_URI: ${{ github.event.inputs.mongodb_uri || github.event.client_payload.mongodb_uri || secrets.ORCHESTRATOR_MONGODB_URI || '' }}
          ORCH_MONGODB_DB: ${{ github.event.inputs.mongodb_db || github.event.client_payload.mongodb_db || 'ugc-dropship' }}
          ORCH_MONGODB_COLLECTION: ${{ github.event.inputs.mongodb_collection || github.event.client_payload.mongodb_collection || 'scraped-posts' }}
          ORCH_HF_TOKEN: ${{ github.event.inputs.hf_token || github.event.client_payload.hf_token || secrets.ORCHESTRATOR_HF_TOKEN || '' }}
          ORCH_HF_REPO: ${{ github.event.inputs.hf_repo || github.event.client_payload.hf_repo || 'rrokutaro/ugc-dropship' }}
          ORCH_HF_ASSETS_PATH: ${{ github.event.inputs.hf_assets_path || github.event.client_payload.hf_assets_path || 'scraped-posts/assets' }}
          ORCH_BATCH_SIZE: ${{ github.event.inputs.batch_size || github.event.client_payload.batch_size || '50' }}
          ORCH_DOWNLOADER_CONCURRENCY: ${{ github.event.inputs.downloader_concurrency || github.event.client_payload.downloader_concurrency || '3' }}
          ORCH_LOG_LEVEL: ${{ github.event.inputs.log_level || github.event.client_payload.log_level || 'info' }}
          ORCH_RECORDING: ${{ github.event.inputs.recording || github.event.client_payload.recording || 'true' }}
          ORCH_RECORDING_FPS: ${{ github.event.inputs.recording_fps || github.event.client_payload.recording_fps || '12' }}
          ORCH_RECORDING_QUALITY: ${{ github.event.inputs.recording_quality || github.event.client_payload.recording_quality || '60' }}
          ORCH_RECORDING_RES: ${{ github.event.inputs.recording_res || github.event.client_payload.recording_res || '1280x800' }}
          ORCH_REVIEW_ENABLED: ${{ github.event.inputs.review_enabled || github.event.client_payload.review_enabled || 'true' }}
          ORCH_REVIEW_FETCH_LIMIT: ${{ github.event.inputs.review_fetch_limit || github.event.client_payload.review_fetch_limit || '60' }}
          ORCH_REVIEW_MAX_ROWS: ${{ github.event.inputs.review_max_rows || github.event.client_payload.review_max_rows || '4' }}
          ORCH_REVIEW_MAX_COLS: ${{ github.event.inputs.review_max_cols || github.event.client_payload.review_max_cols || '5' }}
          ORCH_REVIEW_CELL_ASPECT_RATIO: ${{ github.event.inputs.review_cell_aspect_ratio || github.event.client_payload.review_cell_aspect_ratio || '0.75' }}
          ORCH_REVIEW_COLLAGE_GUTTER: ${{ github.event.inputs.review_collage_gutter || github.event.client_payload.review_collage_gutter || '8' }}
          ORCH_GEMINI_MODEL: ${{ github.event.inputs.gemini_model || github.event.client_payload.gemini_model || 'gemini-3.5-flash-lite' }}
          ORCH_GEMINI_API_KEYS: ${{ github.event.inputs.gemini_api_keys || github.event.client_payload.gemini_api_keys || secrets.ORCHESTRATOR_GEMINI_API_KEYS || '' }}
          ORCH_REVIEW_SAVE_COLLAGES: ${{ github.event.inputs.review_save_collages || github.event.client_payload.review_save_collages || 'false' }}
          ORCH_AUDIT_ENABLED: ${{ github.event.inputs.audit_enabled || github.event.client_payload.audit_enabled || 'true' }}
          ORCH_AUDIT_LIMIT: ${{ github.event.inputs.audit_limit || github.event.client_payload.audit_limit || '40' }}
          ORCH_AUDIT_SAVE_CHANGES: ${{ github.event.inputs.audit_save_changes || github.event.client_payload.audit_save_changes || 'false' }}
          ORCH_RUN_ID: ${{ github.run_id }}
        run: node orchestrator.js

      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orchestrator-output
          path: |
            orchestrator-output/
          retention-days: 1
