name: GLENS

on:
  workflow_dispatch:
    inputs:
      image_urls:
        description: 'JSON array of image URLs (e.g., ["https://i.imgur.com/abc.jpg"])'
        required: false
        default: ''
      mongodb_uri:
        description: 'MongoDB URI (or leave empty to use secrets.GLENS_MONGODB_URI)'
        required: false
        default: ''
      mongodb_db:
        description: 'MongoDB database name'
        required: false
        default: 'ugc-dropship'
      mongodb_collection:
        description: 'MongoDB collection name'
        required: false
        default: 'scraped-posts'
      mongodb_limit:
        description: 'Max number of MongoDB posts to process per run'
        required: false
        default: '20'
      imgbb_api_key:
        description: 'imgbb.com API key (or leave empty to use secrets.GLENS_IMGBB_API_KEY). Optional â€” imgbb is skipped in the upload fallback chain if unset'
        required: false
        default: ''
      hf_token:
        description: 'HuggingFace token for uploading results'
        required: false
        default: ''
      hf_repo:
        description: 'HuggingFace repo ID (e.g., rrokutaro/ugc-dropship)'
        required: false
        default: 'hfusername/ugc-dropship'
      hf_path:
        description: 'Target directory inside the HF repo'
        required: false
        default: 'scraped-posts/glens-responses'
      hf_repo_type:
        description: 'HF repo type: dataset, model, or space'
        required: false
        default: 'dataset'

  repository_dispatch:
    types:
      - glens-run

jobs:
  glens-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Cache apt packages
      uses: actions/cache@v4
      with:
        path: /var/cache/apt/archives
        key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/glens.yml') }}
        restore-keys: |
          apt-${{ runner.os }}-

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg libnss3 libxss1 libasound2t64 libatk1.0-0 libatk-bridge2.0-0 libcups2 libgbm1 libxkbcommon-x11-0 libxcomposite1 libxrandr2 libpango-1.0-0 libcairo2 libxdamage1

    - name: Install npm dependencies
      run: npm install cloakbrowser puppeteer puppeteer-core mmdb-lib formdata-node sharp mongodb

    - name: Get installed CloakBrowser version
      id: cloakbrowser-version
      run: echo "version=$(node -p "require('./node_modules/cloakbrowser/package.json').version")" >> "$GITHUB_OUTPUT"

    - name: Cache CloakBrowser Chromium binary
      uses: actions/cache@v4
      with:
        path: ~/.cloakbrowser
        key: cloakbrowser-${{ runner.os }}-${{ steps.cloakbrowser-version.outputs.version }}

    - name: Install CloakBrowser Chromium binary
      run: npx cloakbrowser install

    - name: Create package.json type module
      run: |
        if [ -f package.json ]; then
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); p.type='module'; fs.writeFileSync('package.json', JSON.stringify(p,null,2)+'\n'); console.log('Updated package.json with type:module');"
        else
          echo '{"name":"glens","type":"module"}' > package.json
        fi

    - name: Verify images exist (local mode only)
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.image_urls == '' && github.event.inputs.mongodb_uri == ''
      run: |
        mkdir -p images
        if [ "$(ls -A images 2>/dev/null)" ]; then
          echo "Images found:"
          ls -la images/
        else
          echo "WARNING: No images in ./images/ directory. The script will fail."
          echo "Add your images to an 'images/' folder in your repo, or pass image_urls / mongodb_uri."
        fi

    - name: Mask HF token
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.hf_token != '' || github.event_name == 'repository_dispatch' && github.event.client_payload.hf_token != ''
      env:
        TOKEN_TO_MASK: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.hf_token || github.event.client_payload.hf_token }}
      run: echo "::add-mask::$TOKEN_TO_MASK"

    - name: Mask imgbb API key
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.imgbb_api_key != '' || github.event_name == 'repository_dispatch' && github.event.client_payload.imgbb_api_key != ''
      env:
        TOKEN_TO_MASK: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.imgbb_api_key || github.event.client_payload.imgbb_api_key }}
      run: echo "::add-mask::$TOKEN_TO_MASK"

    - name: Run GLENS test
      env:
        GLENS_MODE: lens
        GLENS_BATCH_SIZE: 3
        GLENS_BATCH_DELAY_MS: 2000
        GLENS_SEARCH_DELAY_MS: 200
        GLENS_NAV_TIMEOUT: 30000
        GLENS_RESP_TIMEOUT: 30000
        GLENS_JSON_IDLE_MS: 800
        GLENS_UPLOAD_TIMEOUT: 10000
        GLENS_UPLOAD_RETRIES: 2
        GLENS_IMGBB_API_KEY: ${{ github.event.inputs.imgbb_api_key || github.event.client_payload.imgbb_api_key || secrets.GLENS_IMGBB_API_KEY || '' }}
        GLENS_NAV_RETRIES: 2
        GLENS_MAX_RETRIES: 1
        GLENS_BACKOFF_BASE_MS: 300
        GLENS_BACKOFF_MAX_MS: 3000
        GLENS_MAX_DIM: 1024
        GLENS_QUALITY: 85
        GLENS_SCREENSHOTS: "false"
        GLENS_SCREENSHOTS_ERROR_ONLY: "true"
        GLENS_RECORDING: "true"
        GLENS_RECORDING_FPS: 12
        GLENS_RECORDING_QUALITY: 60
        GLENS_RECORDING_RES: 1280x720
        GLENS_RECORDING_OVERLAY_COLOR: "#FF0000"
        GLENS_RECORDING_OVERLAY_SIZE: 16
        GLENS_OUTPUT_DIR: ./output
        GLENS_SKIP_READY_CHECK: "true"
        GLENS_FAST_CLOSE: "true"
        GLENS_NAV_WAIT: domcontentloaded
        GLENS_LOG_LEVEL: info
        GLENS_IMAGE_URLS: ${{ github.event_name == 'repository_dispatch' && toJson(github.event.client_payload.image_urls) || github.event.inputs.image_urls || '' }}
        GLENS_MONGODB_URI: ${{ github.event.inputs.mongodb_uri || github.event.client_payload.mongodb_uri || secrets.GLENS_MONGODB_URI || '' }}
        GLENS_MONGODB_DB: ${{ github.event.inputs.mongodb_db || github.event.client_payload.mongodb_db || 'ugc-dropship' }}
        GLENS_MONGODB_COLLECTION: ${{ github.event.inputs.mongodb_collection || github.event.client_payload.mongodb_collection || 'scraped-posts' }}
        GLENS_MONGODB_LIMIT: ${{ github.event.inputs.mongodb_limit || github.event.client_payload.mongodb_limit || '20' }}
        GLENS_RUN_ID: ${{ github.run_id }}
      run: node glens.js

    - name: Upload successful results to HuggingFace
      if: always() && (github.event_name == 'workflow_dispatch' && github.event.inputs.hf_token != '' || github.event_name == 'repository_dispatch' && github.event.client_payload.hf_token != '')
      env:
        HF_TOKEN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.hf_token || github.event.client_payload.hf_token }}
        HF_REPO: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.hf_repo || github.event.client_payload.hf_repo || 'hfusername/ugc-dropship' }}
        HF_PATH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.hf_path || github.event.client_payload.hf_path || 'scraped-posts/glens-responses' }}
        HF_REPO_TYPE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.hf_repo_type || github.event.client_payload.hf_repo_type || 'dataset' }}
      run: |
        pip install -q huggingface_hub
        python3 << 'PYEOF'
        import os, glob
        from huggingface_hub import HfApi

        token   = os.environ["HF_TOKEN"]
        repo_id = os.environ["HF_REPO"]
        prefix  = os.environ["HF_PATH"]
        rtype   = os.environ["HF_REPO_TYPE"]

        api = HfApi(token=token)
        files = glob.glob("output/successful/*.json")

        if not files:
            print("No successful results to upload.")
            exit(0)

        for f in files:
            name = os.path.basename(f)
            target = f"{prefix}/{name}" if prefix else name
            print(f"Uploading {name}  ->  {repo_id}/{target}")
            api.upload_file(
                path_or_fileobj=f,
                path_in_repo=target,
                repo_id=repo_id,
                repo_type=rtype,
            )
        print(f"Done. Uploaded {len(files)} file(s).")
        PYEOF

    - name: Upload output artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: glens-output
        path: |
          output/
          !output/tmp/
        retention-days: 1
